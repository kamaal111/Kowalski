# Configuration for determining which areas are affected by changed files

# Patterns that affect both server and app
BOTH=".github/workflows/*|justfile"

# Patterns that affect server only
SERVER="server/*|docker-compose.yml|package.json|pnpm-lock.yaml|.node-version|.oxlintrc.json|.oxfmtrc.json|tsconfig.json|.env.example"

# Patterns that affect app only
APP="app/*|.swift-format"
