services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KOWALSKI_DB_NAME:-kowalski}
      POSTGRES_USER: ${KOWALSKI_DB_USER:-kowalski_user}
      POSTGRES_PASSWORD: ${KOWALSKI_DB_PASSWORD:-kowalski_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${KOWALSKI_DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${KOWALSKI_DB_USER:-kowalski_user} -d ${KOWALSKI_DB_NAME:-kowalski}']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
