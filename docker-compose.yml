services:
  kowalski_db:
    image: postgres:17-alpine
    container_name: kowalski-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kowalski
      POSTGRES_USER: kowalski_user
      POSTGRES_PASSWORD: kowalski_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kowalski_user -d kowalski']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
