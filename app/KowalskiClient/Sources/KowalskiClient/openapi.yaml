openapi: 3.1.1
info:
  title: Kowalski API
  version: 1.0.0
paths:
  /app-api/auth/sign-up/email:
    post:
      tags:
        - Authentication
      summary: Sign up with email and password
      description: Create a new user account with email and password
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailPasswordSignUp'
      responses:
        '201':
          description: Account created successfully
          headers:
            set-auth-token:
              schema:
                type: string
                description: Authentication token set in response header
                example: f21wcpz7Aokmlh2MB632MZpTgfruPc62
              required: true
              description: Authentication token set in response header
            set-auth-token-expiry:
              schema:
                type: string
                description: Token expiry time in seconds (as a string representing digits)
                example: '604800'
              required: true
              description: Token expiry time in seconds (as a string representing digits)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /app-api/auth/sign-in/email:
    post:
      tags:
        - Authentication
      summary: Sign in with email and password
      description: Authenticate a user with email and password credentials
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailPasswordSignIn'
      responses:
        '200':
          description: Sign in successful
          headers:
            set-auth-token:
              schema:
                type: string
                description: Authentication token set in response header
                example: f21wcpz7Aokmlh2MB632MZpTgfruPc62
              required: true
              description: Authentication token set in response header
            set-auth-token-expiry:
              schema:
                type: string
                description: Token expiry time in seconds (as a string representing digits)
                example: '604800'
              required: true
              description: Token expiry time in seconds (as a string representing digits)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credentials or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /app-api/auth/sign-out:
    post:
      tags:
        - Authentication
      summary: Sign out
      description: Sign out the current user and invalidate the session
      responses:
        '200':
          description: Sign out successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignOutResponse'
  /app-api/auth/session:
    get:
      tags:
        - Authentication
      summary: Get session
      description: Get the current user session information
      parameters:
        - schema:
            type: string
            description: Bearer token for authentication
            example: Bearer f21wcpz7Aokmlh2MB632MZpTgfruPc62
          required: true
          description: Bearer token for authentication
          name: authorization
          in: header
      responses:
        '200':
          description: Session retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /app-api/stocks/search:
    get:
      summary: Search stocks
      description: Search for stocks by symbol or company name
      tags:
        - Stocks
      parameters:
        - schema:
            type: string
            minLength: 1
            description: Search query for stock symbols or company names
            example: AAPL
          required: true
          description: Search query for stock symbols or company names
          name: q
          in: query
        - schema:
            type: string
            description: Bearer token for authentication
            example: Bearer f21wcpz7Aokmlh2MB632MZpTgfruPc62
          required: true
          description: Bearer token for authentication
          name: authorization
          in: header
      responses:
        '200':
          description: Search stocks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StocksSearchResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stocks not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          minLength: 1
          description: Authentication token for the signed-in user
          example: f21wcpz7Aokmlh2MB632MZpTgfruPc62
      required:
        - token
      title: Authentication Response
      description: Successful authentication response containing authentication token
      example:
        token: f21wcpz7Aokmlh2MB632MZpTgfruPc62
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
      required:
        - message
      title: Error Response
      description: Error response containing error message and optional error code
    EmailPasswordSignUp:
      type: object
      properties:
        email:
          type: string
          minLength: 1
          format: email
          description: User email address
          example: john.doe@example.com
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: User password (minimum 8 characters)
          example: SecurePassword123!
        name:
          type: string
          minLength: 3
          description: User display name (minimum 2 words, each with at least one letter)
          example: John Doe
        callbackURL:
          type: string
          format: uri
          description: URL to redirect to after sign up
          example: https://example.com/dashboard
      required:
        - email
        - password
        - name
      title: Email Password Sign Up
      description: Request body for signing up with email and password
      example:
        email: john.doe@example.com
        password: SecurePassword123!
        name: John Doe
        callbackURL: https://example.com/dashboard
    EmailPasswordSignIn:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: user@example.com
        password:
          type: string
          minLength: 6
          description: User password (minimum 6 characters)
          example: securePassword123
        callbackURL:
          type: string
          format: uri
          description: >-
            Optional URL to redirect to after successful sign in. If not
            provided, the default redirect will be used.
          example: https://app.example.com/dashboard
      required:
        - email
        - password
      title: Email Password Sign In Request
      description: Request payload for signing in with email and password credentials
      example:
        email: user@example.com
        password: securePassword123
        callbackURL: https://app.example.com/dashboard
    SignOutResponse:
      type: object
      properties: {}
      title: Sign Out Response
      description: Successful signout response
    SessionResponse:
      type: object
      properties:
        session:
          type: object
          properties:
            expires_at:
              type: string
              format: date-time
              description: Session expiration timestamp
              example: '2025-10-12T12:08:28.382Z'
            created_at:
              type: string
              format: date-time
              description: Session creation timestamp
              example: '2025-10-05T12:08:28.382Z'
            updated_at:
              type: string
              format: date-time
              description: Session last update timestamp
              example: '2025-10-05T12:08:28.382Z'
          required:
            - expires_at
            - created_at
            - updated_at
        user:
          type: object
          properties:
            name:
              type: string
              description: User full name
              example: John Doe
            email:
              type: string
              format: email
              description: User email address
              example: john@apple.com
            email_verified:
              type: boolean
              description: Whether the user email has been verified
              example: false
            created_at:
              type: string
              format: date-time
              description: User account creation timestamp
              example: '2025-10-05T12:08:28.374Z'
          required:
            - name
            - email
            - email_verified
            - created_at
      required:
        - session
        - user
      title: Session Response
      description: Session response containing session and user information
      example:
        session:
          expires_at: '2025-10-12T12:08:28.382Z'
          created_at: '2025-10-05T12:08:28.382Z'
          updated_at: '2025-10-05T12:08:28.382Z'
        user:
          name: John Doe
          email: john@apple.com
          email_verified: false
          created_at: '2025-10-05T12:08:28.374Z'
    StocksSearchQuoteItem:
      type: object
      properties:
        symbol:
          type: string
          minLength: 1
          description: Stock symbol
          example: AAPL
        exchange:
          type: string
          minLength: 1
          description: Exchange code where the stock is traded
          example: NMS
        name:
          type: string
          minLength: 1
          description: Company name
          example: Apple Inc.
        sector:
          type:
            - null
            - string
          description: Business sector
          example: Technology
        industry:
          type:
            - null
            - string
          description: Industry classification
          example: Consumer Electronics
        exchange_dispatch:
          type:
            - null
            - string
          description: Display name for the exchange
          example: NASDAQ
      required:
        - symbol
        - exchange
        - name
        - sector
        - industry
        - exchange_dispatch
      title: Stock Search Quote Item
      description: Individual stock quote information from search results
      example:
        symbol: AAPL
        exchange: NMS
        name: Apple Inc.
        sector: Technology
        industry: Consumer Electronics
        exchange_dispatch: NASDAQ
    StocksSearchResponse:
      type: object
      properties:
        count:
          type: integer
          minimum: 0
          description: Total number of search results
          example: 1
        quotes:
          type: array
          items:
            $ref: '#/components/schemas/StocksSearchQuoteItem'
          description: Array of stock quotes matching the search query
      required:
        - count
        - quotes
      title: Stocks Search Response
      description: Search results containing matching stock quotes
      example:
        count: 1
        quotes:
          - symbol: AAPL
            exchange: NMS
            name: Apple Inc.
            sector: Technology
            industry: Consumer Electronics
            exchange_dispatch: NASDAQ
  parameters: {}
servers:
  - url: http://127.0.0.1:8080
